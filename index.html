<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Advanced Scientific Calculator</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Poppins",sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#dfe9f3;
  overflow:hidden;
}

/* Floating background blobs */
.blob{
  position:absolute;
  border-radius:50%;
  filter:blur(80px);
  opacity:.5;
  animation:float 8s infinite alternate;
}

.blob1{
  width:250px;
  height:250px;
  background:#6a11cb;
  top:-50px;
  left:-50px;
}

.blob2{
  width:300px;
  height:300px;
  background:#2575fc;
  bottom:-100px;
  right:-50px;
}

@keyframes float{
  from{transform:translateY(0px);}
  to{transform:translateY(40px);}
}

/* Calculator */
.wrapper{
  display:flex;
  gap:20px;
  align-items:flex-start;
}

.calculator{
  width:380px;
  padding:25px;
  border-radius:35px;
  background:#dfe9f3;
  box-shadow:
    12px 12px 24px #bec8d2,
    -12px -12px 24px #ffffff;
  position:relative;
  cursor:grab;
  user-select:none;
}

.calculator:active{
  cursor:grabbing;
}

/* History Sidebar */
.history-panel{
  width:220px;
  max-height:620px;
  overflow-y:auto;
  padding:20px;
  border-radius:30px;
  background:#dfe9f3;
  box-shadow:
    inset 8px 8px 16px #bec8d2,
    inset -8px -8px 16px #ffffff;
}

.history-panel h3{
  margin-bottom:15px;
  color:#555;
}

.history-item{
  padding:12px;
  margin-bottom:10px;
  border-radius:15px;
  background:#e8f0f8;
  font-size:.9rem;
  color:#333;
  box-shadow:
    4px 4px 8px #c5ced8,
    -4px -4px 8px #ffffff;
}

/* Display */
.display-box{
  padding:20px;
  border-radius:25px;
  margin-bottom:20px;
  background:#dfe9f3;
  box-shadow:
    inset 8px 8px 16px #bec8d2,
    inset -8px -8px 16px #ffffff;
}

.history{
  text-align:right;
  color:#777;
  min-height:24px;
  margin-bottom:5px;
}

.display{
  width:100%;
  border:none;
  background:transparent;
  outline:none;
  text-align:right;
  font-size:2.5rem;
  color:#222;
}

/* Buttons */
.buttons{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:15px;
}

button{
  height:65px;
  border:none;
  border-radius:20px;
  font-size:1rem;
  cursor:pointer;
  transition:.2s ease;
  background:#dfe9f3;
  color:#333;
  box-shadow:
    6px 6px 12px #bec8d2,
    -6px -6px 12px #ffffff;
}

button:hover{
  transform:translateY(-3px);
}

button:active{
  transform:scale(.93);
  box-shadow:
    inset 4px 4px 8px #bec8d2,
    inset -4px -4px 8px #ffffff;
}

.operator{
  color:#2575fc;
  font-weight:bold;
}

.equal{
  background:linear-gradient(135deg,#2575fc,#6a11cb);
  color:white;
}

.clear{
  color:#ff4d4d;
}

/* Mobile */
@media(max-width:850px){
  .wrapper{
    flex-direction:column;
    align-items:center;
  }

  .history-panel{
    width:90%;
    max-height:200px;
  }

  .calculator{
    width:95%;
  }
}
</style>
</head>

<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="wrapper">

  <!-- Calculator -->
  <div class="calculator" id="calculator">

    <div class="display-box">
      <div class="history" id="history"></div>
      <input type="text" id="display" class="display" disabled />
    </div>

    <div class="buttons">
      <button class="clear" onclick="clearDisplay()">C</button>
      <button onclick="appendValue('(')">(</button>
      <button onclick="appendValue(')')">)</button>
      <button class="operator" onclick="appendValue('/')">÷</button>
      <button class="operator" onclick="deleteLast()">⌫</button>

      <button onclick="appendValue('7')">7</button>
      <button onclick="appendValue('8')">8</button>
      <button onclick="appendValue('9')">9</button>
      <button class="operator" onclick="appendValue('*')">×</button>
      <button onclick="appendValue('Math.sqrt(')">√</button>

      <button onclick="appendValue('4')">4</button>
      <button onclick="appendValue('5')">5</button>
      <button onclick="appendValue('6')">6</button>
      <button class="operator" onclick="appendValue('-')">−</button>
      <button onclick="appendValue('Math.pow(')">xʸ</button>

      <button onclick="appendValue('1')">1</button>
      <button onclick="appendValue('2')">2</button>
      <button onclick="appendValue('3')">3</button>
      <button class="operator" onclick="appendValue('+')">+</button>
      <button onclick="appendValue('Math.sin(')">sin</button>

      <button onclick="appendValue('0')">0</button>
      <button onclick="appendValue('.')">.</button>
      <button onclick="appendValue('Math.cos(')">cos</button>
      <button onclick="appendValue('Math.tan(')">tan</button>
      <button class="equal" onclick="calculate()">=</button>
    </div>
  </div>

  <!-- History -->
  <div class="history-panel">
    <h3>History</h3>
    <div id="historyList"></div>
  </div>

</div>

<!-- Sound -->
<audio id="clickSound">
  <source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" type="audio/mp3">
</audio>

<script>
const display = document.getElementById("display");
const historyText = document.getElementById("history");
const historyList = document.getElementById("historyList");
const clickSound = document.getElementById("clickSound");

/* Button sound */
function playSound(){
  clickSound.currentTime = 0;
  clickSound.play();
}

function appendValue(value){
  playSound();
  display.value += value;
}

function clearDisplay(){
  playSound();
  display.value = "";
  historyText.innerText = "";
}

function deleteLast(){
  playSound();
  display.value = display.value.slice(0,-1);
}

function calculate(){
  playSound();

  try{
    const expression = display.value;
    const result = eval(expression);

    historyText.innerText = expression;
    display.value = result;

    addHistory(expression,result);
  }
  catch{
    display.value = "Error";
  }
}

/* Sidebar History */
function addHistory(exp,res){
  const div = document.createElement("div");
  div.className = "history-item";
  div.innerHTML = `
    <strong>${exp}</strong><br>
    = ${res}
  `;

  historyList.prepend(div);
}

/* Keyboard Support */
document.addEventListener("keydown",(e)=>{
  const key = e.key;

  if(!isNaN(key) || ['+','-','*','/','.','(',')'].includes(key)){
    appendValue(key);
  }
  else if(key === "Enter"){
    calculate();
  }
  else if(key === "Backspace"){
    deleteLast();
  }
});

/* Drag Animation */
const calculator = document.getElementById("calculator");

let isDragging = false;
let offsetX, offsetY;

calculator.addEventListener("mousedown",(e)=>{
  isDragging = true;

  offsetX = e.clientX - calculator.offsetLeft;
  offsetY = e.clientY - calculator.offsetTop;

  calculator.style.position = "absolute";
});

document.addEventListener("mousemove",(e)=>{
  if(isDragging){
    calculator.style.left = e.clientX - offsetX + "px";
    calculator.style.top = e.clientY - offsetY + "px";
  }
});

document.addEventListener("mouseup",()=>{
  isDragging = false;
});
</script>

</body>
</html>
